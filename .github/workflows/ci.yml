name: CI

on:
  push:
    branches: [main, Development]
  pull_request:
    branches: [main, Development]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      DATABASE_URL: postgresql://placeholder@localhost/db
      DIRECT_URL: postgresql://placeholder@localhost/db
      VITE_SUPABASE_URL: https://placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: placeholder
      VITE_API_URL: http://localhost:3001/api/v1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @radikal/db exec prisma generate

      - name: Typecheck (monorepo)
        run: pnpm typecheck

      - name: Lint (monorepo)
        run: pnpm lint

      - name: Test API
        run: pnpm --filter @radikal/api test

      - name: Test Web
        run: pnpm --filter @radikal/web test

      - name: Build (monorepo)
        run: pnpm build
